<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/SClogo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#10131f" />
    <meta name="description" content="Check out my AI image generator!" />
    <link rel="preconnect" href="https://res.cloudinary.com" crossorigin />
    <link rel="preconnect" href="%VITE_BACKEND_URL%" crossorigin />
    <link rel="dns-prefetch" href="%VITE_BACKEND_URL%" />
    <link rel="preload" href="/fonts/InterVariable.woff2" as="font" type="font/woff2" crossorigin />
    <title>Art/official</title>

    <script>
      var __srcsetWidths = [400, 640, 828, 1080];
      var __cardSizes = '(max-width: 479px) 92vw, (max-width: 639px) 45vw, (max-width: 1023px) 30vw, 22vw';

      window.__PREFETCH_POSTS__ = fetch('%VITE_BACKEND_URL%/api/v1/post', {
        headers: { 'Content-Type': 'application/json' }
      }).then(function(r) { return r.ok ? r.json() : null; }).catch(function() { return null; });

      window.__PREFETCH_POSTS__.then(function(data) {
        if (!data || !data.data || !data.data.length) return;
        var photo = data.data[0].photo;
        if (!photo || photo.indexOf('res.cloudinary.com') === -1) return;
        var srcset = __srcsetWidths.map(function(w) {
          return photo.replace('/upload/', '/upload/f_auto,q_auto:good,w_' + w + ',c_fill/') + ' ' + w + 'w';
        }).join(', ');
        var link = document.createElement('link');
        link.rel = 'preload';
        link.as = 'image';
        link.setAttribute('imagesrcset', srcset);
        link.setAttribute('imagesizes', __cardSizes);
        link.setAttribute('fetchpriority', 'high');
        document.head.appendChild(link);
      });

      window.__PREFETCH_STATS__ = fetch('%VITE_BACKEND_URL%/api/v1/post/stats')
        .then(function(r) { return r.ok ? r.json() : null; }).catch(function() { return null; });
    </script>

    <!-- OpenGraph tags (Facebook, LinkedIn, iMessage, Android, etc.) -->
    <meta property="og:title" content="Art/official" />
    <meta property="og:description" content="Check out my AI image generator!" />
    <meta property="og:url" content="https://www.artofficial.fun/" />
    <meta property="og:site_name" content="Art/official" />
    <meta property="og:image" content="https://www.artofficial.fun/Artofficial_thumbnail-min.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:type" content="website" />
    
    <!-- Twitter tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Art/official" />
    <meta name="twitter:description" content="Check out my AI image generator!" />
    <meta name="twitter:image" content="https://www.artofficial.fun/Artofficial_thumbnail-min.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
